name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: audienceroom_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d audienceroom_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: test
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      POSTGRES_DB: audienceroom_test
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/audienceroom_test
      FIREBASE_PROJECT_ID: demo-audienceroom
      FIREBASE_AUTH_EMULATOR_HOST: localhost:9099

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI and start emulator
        run: |
          npm install -g firebase-tools
          cd ../firebase
          firebase emulators:start --project demo-audienceroom &
          sleep 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: pytest
