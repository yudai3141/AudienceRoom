version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: audienceroom-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audienceroom-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - firebase-emulator
    environment:
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulator:9099

  db:
    image: postgres:16
    container_name: audienceroom-db
    environment:
      POSTGRES_DB: audienceroom
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  firebase-emulator:
    build:
      context: ./firebase
      dockerfile: Dockerfile
    container_name: audienceroom-firebase
    ports:
      - "9099:9099"
      - "4000:4000"

  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    container_name: audienceroom-voicevox
    ports:
      - "50021:50021"

volumes:
  postgres_data: